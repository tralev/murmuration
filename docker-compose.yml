# docker-compose.yml — Murmuration Bird Flock Simulation
#
# Quick start for students:
#   1. Install Docker:  https://docs.docker.com/get-docker/
#   2. Clone the repo:  git clone https://github.com/tralev/murmuration.git
#   3. Run:             docker compose up
#
# What happens:
#   - Builds the image (Pygame + numpy/scipy; runs headless via the SDL
#     dummy video driver — no xvfb needed)
#   - Runs the simulation until you press Ctrl+C
#   - CSV metrics are saved to ./output/murmuration_metrics.csv
#   - Press Ctrl+C to stop early
#
# ──────────────────────────────────────────────────────────────────────

services:
  murmuration:
    build: .
    image: murmuration:latest
    container_name: murmuration
    # Run headless with dummy video driver (no xvfb needed — much faster)
    command: python -u alg2.py
    # Mount output subdirectory so CSV metrics persist after container stops
    volumes:
      - ./output:/app/output
    environment:
      - SDL_VIDEODRIVER=dummy
      - SDL_AUDIODRIVER=dummy
      - PYTHONUNBUFFERED=1
    # Run for 60 seconds (enough to collect ~360 frames of data)
    # Remove or increase for longer runs
    stop_grace_period: 5s

  # ── Unit tests — run with:  docker compose run tests ───────────────
  #  Runs the full canonical 12-module suite (600 tests), matching CI and
  #  the pre-commit hook. Kept in sync with .github/workflows/test.yml.
  #  The 3D-renderer import test skips when moderngl is absent (it is not
  #  installed in this lean image); every other test runs headlessly.
  tests:
    build: .
    image: murmuration:latest
    command: >
      python -m unittest
      test_occlusion test_boundary test_presets test_alg2
      test_cross_language test_projection_model test_spatial_model
      test_input_handler test_3d test_features test_help_overlay
      extensions.test_extensions
    environment:
      - SDL_VIDEODRIVER=dummy
      - SDL_AUDIODRIVER=dummy
      - PYTHONUNBUFFERED=1

  # ── Interactive shell — run with:  docker compose run shell ────────
  shell:
    build: .
    image: murmuration:latest
    command: /bin/bash
    stdin_open: true
    tty: true

  # ── GNU Octave interactive — run with:  docker compose run octave ───
  octave:
    build: .
    image: murmuration:latest
    command: octave --no-gui
    stdin_open: true
    tty: true

  # ── Scilab interactive — run with:  docker compose run scilab ───────
  scilab:
    build: .
    image: murmuration:latest
    command: scilab-cli
    stdin_open: true
    tty: true
