# docker-compose.yml — Murmuration 3D Bird Flock Simulation
#
# Quick start:
#   1. Install Docker:  https://docs.docker.com/get-docker/
#   2. Clone the repo:  git clone https://github.com/tralev/murmuration.git
#   3. Run the tests:   docker compose run --rm tests
#      Run the sim:     docker compose run --rm murmuration
#
# All services share one image (murmuration:latest) — the first `build`
# produces it and the rest reuse it.
# ──────────────────────────────────────────────────────────────────────

services:
  # ── 3D simulation, headless on a virtual X display (Xvfb + Mesa) ───
  murmuration:
    build: .
    image: murmuration:latest
    command: xvfb-run -a python -u main_3d.py
    stdin_open: true
    tty: true

  # ── Test suite — pure numpy/scipy, no GPU or display needed ────────
  #  Runs the shared gate (syntax check + unit tests) inside the image.
  tests:
    build: .
    image: murmuration:latest
    command: ./run_tests.sh -v

  # ── Interactive shell in the image ─────────────────────────────────
  shell:
    build: .
    image: murmuration:latest
    command: /bin/bash
    stdin_open: true
    tty: true
