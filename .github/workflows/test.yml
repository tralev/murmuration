# .github/workflows/test.yml — Continuous Integration
#
# Two independent jobs:
#   • tests  — unit tests across Python versions. Needs the full runtime deps
#              because test_ui_3d imports pygame/glm/moderngl (though it never
#              opens a display or GL context — events are mocked).
#   • docker — build the image and prove it both passes the tests and
#              launches the 3D simulation headless (Xvfb + Mesa).

name: Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        # numpy/scipy for the science tests; pygame/PyGLM/moderngl so the
        # test_ui_3d module imports (it mocks events — no display/GL context);
        # coverage for the enforced coverage floor.
        run: pip install "numpy>=1.21" "scipy>=1.7" "pygame>=2.0,<3.0" "PyGLM>=2.5" "moderngl>=5.6" "coverage>=7.0"

      - name: Run the Python test gate (run_tests.sh)
        env:
          RUN_SLOW_TESTS: "1"   # include the ~25s marginal-opacity integration test
          COVERAGE: "1"         # run under coverage and enforce COVERAGE_MIN (95%)
        run: ./run_tests.sh -v

  docker:
    name: Docker image builds, tests, and the sim launches
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run the Docker test gate (docker_test.sh)
        # Builds the image, runs the unit tests inside it, and smoke-launches
        # the 3D simulation headless (Xvfb + Mesa software GL).
        run: ./docker_test.sh murmuration:ci
