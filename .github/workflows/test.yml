# .github/workflows/test.yml — Continuous Integration
#
# Runs on every push and pull request to main.
# Three-stage pipeline: syntax check → test-count gate → full test suite.
# Blocks merge unless all 457 tests pass.

name: Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # 3D simulation dependencies (needed by test_3d, test_features)
          pip install moderngl PyGLM numpy

      - name: Stage 1/3 — Syntax check (fast fail)
        run: |
          echo "::group::Compiling all .py files"
          find . -name '*.py' \
            -not -path './.git/*' \
            -not -path './__pycache__/*' \
            -print0 | xargs -0 -P 4 python -m py_compile
          echo "::endgroup::"
          echo "✓ syntax OK"

      - name: Stage 2/3 — Test-count gate
        run: |
          echo "::group::Test-count consistency"
          SDL_VIDEODRIVER=dummy SDL_AUDIODRIVER=dummy bash scripts/check-test-count.sh
          echo "::endgroup::"
          echo "✓ test counts consistent"

      - name: Stage 3/3 — Full test suite
        run: |
          echo "::group::Running all 472 tests"
          SDL_VIDEODRIVER=dummy SDL_AUDIODRIVER=dummy python -m unittest \
            test_occlusion \
            test_boundary \
            test_presets \
            test_alg2 \
            test_cross_language \
            test_projection_model \
            test_spatial_model \
            test_input_handler \
            test_3d \
            test_features \
            test_help_overlay \
            extensions.test_extensions \
            -v
          echo "::endgroup::"
          echo "✓ all 472 tests passed"
