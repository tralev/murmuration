# .github/workflows/test.yml — Continuous Integration
#
# Two independent jobs:
#   • tests  — fast unit tests across Python versions (numpy + scipy only;
#              the suite is pure math and imports no GL/pygame modules).
#   • docker — build the image and prove it both passes the tests and
#              launches the 3D simulation headless (Xvfb + Mesa).

name: Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        # The test suite (test_3d, test_science_3d) is pure numpy/scipy —
        # it imports none of the GL modules (renderer_3d, main_3d, moderngl).
        run: pip install "numpy>=1.21" "scipy>=1.7"

      - name: Run the Python test gate (run_tests.sh)
        env:
          RUN_SLOW_TESTS: "1"   # include the ~25s marginal-opacity integration test
        run: ./run_tests.sh -v

  docker:
    name: Docker image builds, tests, and the sim launches
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run the Docker test gate (docker_test.sh)
        # Builds the image, runs the unit tests inside it, and smoke-launches
        # the 3D simulation headless (Xvfb + Mesa software GL).
        run: ./docker_test.sh murmuration:ci
