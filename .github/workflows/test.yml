# .github/workflows/test.yml — Continuous Integration
#
# Two independent jobs:
#   • tests  — fast unit tests across Python versions (numpy + scipy only;
#              the suite is pure math and imports no GL/pygame modules).
#   • docker — build the image and prove it both passes the tests and
#              launches the 3D simulation headless (Xvfb + Mesa).

name: Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        # The test suite (test_3d, test_science_3d) is pure numpy/scipy —
        # it imports none of the GL modules (renderer_3d, main_3d, moderngl).
        run: pip install "numpy>=1.21" "scipy>=1.7"

      - name: Syntax check (compile every module)
        run: |
          find . -name '*.py' -not -path './.git/*' -not -path './sci/*' \
            -print0 | xargs -0 -P 4 python -m py_compile
          echo "✓ syntax OK"

      - name: Run the test suite
        run: |
          python -m unittest test_3d test_science_3d -v
          echo "✓ tests passed"

  docker:
    name: Docker image builds, tests, and the sim launches
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build the image
        run: docker build -t murmuration:ci .

      - name: Run the test suite inside the image
        run: docker run --rm murmuration:ci python -m unittest test_3d test_science_3d

      - name: Smoke-launch the 3D simulation headless
        # Xvfb + Mesa software GL. The sim has no fixed exit, so run it for a
        # few seconds and assert it reached the main loop (printed its banner)
        # without crashing on the ModernGL context.
        run: |
          out=$(docker run --rm murmuration:ci \
                  timeout 15 xvfb-run -a python -u main_3d.py 2>&1 || true)
          echo "$out"
          echo "$out" | grep -q "Murmuration 3D" \
            && echo "✓ simulation launched" \
            || (echo "✗ simulation did not start" && exit 1)
