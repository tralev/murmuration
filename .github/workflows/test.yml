# .github/workflows/test.yml — Continuous Integration
#
# Runs on every push and pull request to main.
# Executes the full test suite (original + all 9 extension priorities).

name: Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Test discovery gate (fast — fails early if counts drifted)
        run: |
          SDL_VIDEODRIVER=dummy SDL_AUDIODRIVER=dummy python -m unittest test_alg2.TestDiscovery extensions.test_extensions.TestDiscovery -v

      - name: Run full test suite
        run: |
          SDL_VIDEODRIVER=dummy SDL_AUDIODRIVER=dummy python -m unittest test_alg2 extensions.test_extensions -v
