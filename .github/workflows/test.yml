# .github/workflows/test.yml — Continuous Integration
#
# Runs on every push and pull request to main.
# Two stages: syntax check → full test suite (3D-only stack).

name: Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Test-critical numerical + 3D deps (also in requirements.txt;
          # listed explicitly so the set is obvious). numpy + scipy back the
          # 3D physics and the metrics/H2 science modules; moderngl/PyGLM let
          # main_3d import (GPU-context tests are skipped headlessly).
          pip install numpy scipy moderngl PyGLM

      - name: Stage 1/2 — Syntax check (fast fail)
        run: |
          echo "::group::Compiling all .py files"
          find . -name '*.py' \
            -not -path './.git/*' \
            -not -path './__pycache__/*' \
            -print0 | xargs -0 -P 4 python -m py_compile
          echo "::endgroup::"
          echo "✓ syntax OK"

      - name: Stage 2/2 — Test suite
        run: |
          echo "::group::Running the 3D test suite"
          SDL_VIDEODRIVER=dummy SDL_AUDIODRIVER=dummy python -m unittest \
            test_3d \
            test_science_3d \
            -v
          echo "::endgroup::"
          echo "✓ all tests passed"
